          - service: switch.turn_off
            target: { entity_id: !input target_switch }

      # Sunday
      - conditions: "{{ trigger.id == 'sun_morning' and (int(inputs['sun_morning_duration']) > 0) }}"
        sequence:
          - service: switch.turn_on
            target: { entity_id: !input target_switch }
          - delay: { minutes: !input sun_morning_duration }
          - service: switch.turn_off
            target: { entity_id: !input target_switch }

      - conditions: "{{ trigger.id == 'sun_evening' and (int(inputs['sun_evening_duration']) > 0) }}"
        sequence:
          - service: switch.turn_on
            target: { entity_id: !input target_switch }
