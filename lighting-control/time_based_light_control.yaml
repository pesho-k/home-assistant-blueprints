      # Friday
      - conditions: "{{ trigger.id == 'fri_morning' and (int(inputs['fri_morning_duration']) > 0) }}"
        sequence:
          - service: switch.turn_on
            target: { entity_id: !input target_switch }
          - delay: { minutes: !input fri_morning_duration }
          - service: switch.turn_off
            target: { entity_id: !input target_switch }

      - conditions: "{{ trigger.id == 'fri_evening' and (int(inputs['fri_evening_duration']) > 0) }}"
        sequence:
          - service: switch.turn_on
