      # Thursday
      - conditions: "{{ trigger.id == 'thu_morning' and (int(inputs['thu_morning_duration']) > 0) }}"
        sequence:
          - service: switch.turn_on
            target: { entity_id: !input target_switch }
          - delay: { minutes: !input thu_morning_duration }
          - service: switch.turn_off
            target: { entity_id: !input target_switch }

      - conditions: "{{ trigger.id == 'thu_evening' and (int(inputs['thu_evening_duration']) > 0) }}"
        sequence:
